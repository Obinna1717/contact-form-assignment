{% extends 'base.html' %}

{% block content %}
<div>
    <h2>Contact Us</h2>

    <form method="POST">
        {% csrf_token %}
        
        <div>
            <label for="id_name">Name:</label>
            <input type="text" id="id_name" name="name" maxlength="100" required placeholder="Your Name">
        </div>

        <br>

        <div>
            <label for="id_email">Email Address:</label>
            <input type="email" id="id_email" name="email" required placeholder="Your Email">
        </div>

        <br>

        <div>
            <label for="message">Message:</label>
            <textarea id="message" name="message" maxlength="500"  placeholder="Your Message"></textarea>
        </div>

        <br>

        <button type="submit">SUBMIT HERE</button>
    </form>
</div>
{% endblock %}
